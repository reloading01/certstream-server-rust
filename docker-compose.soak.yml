# 24-hour soak override. Mounts the full-feature config + a state dir,
# overrides healthcheck to also require an authenticated /api/stats hit
# (so we detect auth-middleware regressions, not just /health alive).
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.soak.yml up -d

services:
  certstream-server-rust:
    container_name: certstream-soak
    environment:
      - CERTSTREAM_LOG_LEVEL=info
      - CERTSTREAM_BUFFER_SIZE=4096
    volumes:
      - ./config.soak.yaml:/etc/certstream/config.yaml:ro
      - ./soak-state:/var/lib/certstream
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health && curl -sf http://localhost:8080/metrics > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
